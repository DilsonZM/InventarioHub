<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#020617" media="(prefers-color-scheme: dark)">
  <meta name="description" content="Gestion de inventario para comida rapida">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="InventarioHub">
  <title>InventarioHub - Acceso</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">
  <link rel="manifest" href="/manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.375vw, 1rem);
      --text-base: clamp(1rem, 0.9rem + 0.5vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.625vw, 1.25rem);
      --text-xl: clamp(1.25rem, 1rem + 1.25vw, 1.5rem);
      --text-2xl: clamp(1.5rem, 1.25rem + 1.25vw, 2rem);
      --text-3xl: clamp(1.875rem, 1.5rem + 1.875vw, 2.5rem);
      --text-4xl: clamp(2.25rem, 1.75rem + 2.5vw, 3.5rem);
    }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: var(--text-base);
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    .font-mono { font-family: 'Space Mono', monospace; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(251, 146, 60, 0.25), 0 0 60px rgba(251, 146, 60, 0.1); }
      50% { box-shadow: 0 0 50px rgba(251, 146, 60, 0.4), 0 0 100px rgba(251, 146, 60, 0.15); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes overlay-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes overlay-out {
      from { opacity: 1; transform: scale(1); }
      to { opacity: 0; transform: scale(0.96); }
    }
    @keyframes loading-bounce {
      0%, 100% { transform: translateY(0) scaleY(1); }
      50% { transform: translateY(-12px) scaleY(0.7); }
    }
    @keyframes spinner-rotate {
      to { transform: rotate(360deg); }
    }
    @keyframes mouth-open-top {
      from { transform: translateY(0); }
      to { transform: translateY(-22px); }
    }
    @keyframes mouth-open-bottom {
      from { transform: translateY(0); }
      to { transform: translateY(22px); }
    }
    @keyframes mouth-close-top {
      from { transform: translateY(-22px); }
      to { transform: translateY(0); }
    }
    @keyframes mouth-close-bottom {
      from { transform: translateY(22px); }
      to { transform: translateY(0); }
    }
    @keyframes ingredient-rise {
      from { opacity: 0; transform: translateY(8px) scale(0.6); }
      60%  { opacity: 1; transform: translateY(-2px) scale(1.08); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes jelly-wobble {
      0%, 100% { transform: scale(1, 1) rotate(0); }
      15% { transform: scale(1.08, 0.92) rotate(-2deg); }
      30% { transform: scale(0.94, 1.06) rotate(2deg); }
      45% { transform: scale(1.05, 0.95) rotate(-1.2deg); }
      60% { transform: scale(0.97, 1.03) rotate(1.2deg); }
      75% { transform: scale(1.02, 0.98) rotate(-0.6deg); }
      90% { transform: scale(0.99, 1.01) rotate(0.4deg); }
    }
    @keyframes text-shine {
      0% { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    .animate-fade-up { animation: fadeUp 0.6s ease-out forwards; opacity: 0; }
    .animate-fade-up-delay-1 { animation-delay: 0.1s; }
    .animate-fade-up-delay-2 { animation-delay: 0.2s; }
    .animate-fade-up-delay-3 { animation-delay: 0.3s; }
    .animate-fade-up-delay-4 { animation-delay: 0.4s; }

    .gradient-mesh {
      background:
        radial-gradient(ellipse at 20% 80%, rgba(59, 130, 246, 0.18) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(251, 146, 60, 0.08) 0%, transparent 70%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }
    .bg-noise {
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    }

    input:focus, select:focus { transform: translateY(-1px); }
    button:not(:disabled):active { transform: scale(0.98); }

    /* === HAMBURGUESA: estilo cocodrilo mordida + gelatina === */
    .burger-icon { display: block; transform-origin: center; }
    .burger-icon > svg { transform-origin: center; }

    /* BOCA ABIERTA: panes se separan */
    .burger-bun-top {
      animation: mouth-open-top 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 0.2s;
    }
    .burger-bun-bottom {
      animation: mouth-open-bottom 0.5s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 0.2s;
    }

    /* Ingredientes aparecen dentro (de abajo hacia arriba) */
    .burger-patty {
      animation: ingredient-rise 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 0.7s;
      transform-origin: center;
    }
    .burger-cheese {
      animation: ingredient-rise 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 0.85s;
      transform-origin: center;
    }
    .burger-tomato {
      animation: ingredient-rise 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 1.0s;
      transform-origin: center;
    }
    .burger-lettuce {
      animation: ingredient-rise 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) both;
      animation-delay: 1.15s;
      transform-origin: center;
    }

    /* BOCA SE CIERRA: cocodrilo muerde */
    .burger-bun-top.close {
      animation: mouth-close-top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) both;
      animation-delay: 1.55s;
    }
    .burger-bun-bottom.close {
      animation: mouth-close-bottom 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) both;
      animation-delay: 1.55s;
    }

    /* GELATINA: wobble continuo despues de formarse */
    .burger-icon.jelly {
      animation: jelly-wobble 3.5s ease-in-out infinite;
      animation-delay: 2.3s;
    }

    /* Particle canvas */
    #particleCanvas {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 1; pointer-events: none;
    }

    /* Loading overlay */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 100;
      min-height: 100dvh; height: 100dvh; width: 100vw;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      gap: 0.5rem;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      background: linear-gradient(180deg, #020617 0%, #0f172a 100%);
      animation: overlay-in 0.3s ease-out;
      overflow: hidden;
    }
    .loading-overlay.fade-out { animation: overlay-out 0.4s ease-in forwards; }
    .loading-overlay svg { transform-origin: center; animation: jelly-wobble 3.5s ease-in-out infinite; }

    .loading-bars { display: flex; gap: 6px; align-items: end; height: 30px; margin-top: 20px; }
    .loading-bar {
      width: 6px; height: 100%; border-radius: 3px;
      background: linear-gradient(180deg, #f97316, #fbbf24);
      animation: loading-bounce 1.2s ease-in-out infinite;
    }
    .loading-bar:nth-child(1) { animation-delay: 0s; }
    .loading-bar:nth-child(2) { animation-delay: 0.15s; }
    .loading-bar:nth-child(3) { animation-delay: 0.3s; }
    .loading-bar:nth-child(4) { animation-delay: 0.45s; }
    .loading-bar:nth-child(5) { animation-delay: 0.6s; }

    /* Title shine */
    .title-shine {
      background: linear-gradient(110deg, #ffffff 0%, #fbbf24 25%, #ffffff 50%, #fbbf24 75%, #ffffff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: text-shine 6s linear infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      #particleCanvas { display: none; }
    }

    .touch-target { min-height: 44px; min-width: 44px; }

    /* Solo en portrait/height restrictivo: scroll si el form es muy largo */
    @media (max-height: 800px) {
      .login-card { max-height: 92dvh; overflow-y: auto; }
      .login-card::-webkit-scrollbar { width: 4px; }
      .login-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    }

    /* Layout 2 columnas solo en landscape */
    @media (orientation: landscape) and (max-height: 500px) {
      .login-layout { flex-direction: row !important; align-items: center !important; gap: 2.5rem !important; }
      .login-aside { display: flex !important; }
      .login-card { max-width: 24rem !important; max-height: 90dvh; overflow-y: auto; }
      .login-card .login-header { display: none !important; }
    }
  </style>
</head>
<body class="h-full bg-slate-950 text-white">

  <!-- Canvas de particulas (fondo) -->
  <canvas id="particleCanvas"></canvas>

  <div class="login-layout min-h-[100dvh] flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8 relative gap-6 overflow-hidden" style="z-index: 2;">
    <div class="absolute inset-0 gradient-mesh bg-noise pointer-events-none"></div>

    <div class="absolute top-0 left-1/4 w-64 h-64 sm:w-80 sm:h-80 lg:w-96 lg:h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-64 h-64 sm:w-80 sm:h-80 lg:w-96 lg:h-96 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Columna izquierda: branding (visible en landscape) -->
    <div class="login-aside hidden flex-col items-center justify-center text-center shrink-0 max-w-xs">
      <div id="burgerContainerL" class="burger-icon jelly inline-flex items-center justify-center w-32 h-32 rounded-3xl bg-gradient-to-br from-orange-500/20 to-amber-500/20 backdrop-blur-xl border border-orange-400/20 mb-4" style="animation: pulse-glow 3s ease-in-out infinite;">
        <svg viewBox="0 0 100 100" class="w-20 h-20" fill="none">
          <g class="burger-bun-top close"><path d="M18 38 Q18 18, 50 18 Q82 18, 82 38 L82 42 L18 42 Z" fill="url(#bunGradL)" stroke="#d97706" stroke-width="1.2"/><circle cx="38" cy="28" r="1.4" fill="#fde68a"/><circle cx="55" cy="25" r="1.2" fill="#fde68a"/><circle cx="68" cy="30" r="1.4" fill="#fde68a"/><circle cx="46" cy="33" r="1" fill="#fde68a"/></g>
          <g class="burger-lettuce"><path d="M14 48 Q20 44, 26 48 T38 48 T50 48 T62 48 T74 48 T86 48 L86 54 L14 54 Z" fill="#86efac" stroke="#16a34a" stroke-width="1"/></g>
          <g class="burger-tomato"><rect x="16" y="55" width="68" height="6" rx="2" fill="#fb7185" stroke="#be123c" stroke-width="0.8"/><circle cx="28" cy="58" r="0.8" fill="#fecdd3"/><circle cx="50" cy="58" r="0.8" fill="#fecdd3"/><circle cx="72" cy="58" r="0.8" fill="#fecdd3"/></g>
          <g class="burger-cheese"><path d="M14 62 L86 62 L82 70 L18 70 Z" fill="#fde047" stroke="#ca8a04" stroke-width="0.8"/><path d="M22 70 L20 74" stroke="#ca8a04" stroke-width="0.8"/><path d="M50 70 L48 74" stroke="#ca8a04" stroke-width="0.8"/><path d="M78 70 L76 74" stroke="#ca8a04" stroke-width="0.8"/></g>
          <g class="burger-patty"><rect x="14" y="71" width="72" height="8" rx="3" fill="#78350f" stroke="#451a03" stroke-width="0.8"/><ellipse cx="30" cy="75" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/><ellipse cx="55" cy="74" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/><ellipse cx="72" cy="76" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/></g>
          <g class="burger-bun-bottom close"><path d="M18 80 L82 80 L82 84 Q82 88, 78 88 L22 88 Q18 88, 18 84 Z" fill="url(#bunGradL)" stroke="#d97706" stroke-width="1.2"/></g>
          <defs><linearGradient id="bunGradL" x1="0" y1="0" x2="100" y2="100"><stop offset="0" stop-color="#fcd34d"/><stop offset="1" stop-color="#f59e0b"/></linearGradient></defs>
        </svg>
      </div>
      <h1 class="text-2xl font-bold title-shine">InventarioHub</h1>
      <p class="text-slate-400 mt-1 text-sm">Gestion inteligente de inventario</p>
    </div>

    <div class="login-card w-full max-w-md relative z-10">

      <!-- Header: hamburguesa animada + titulo (oculto en landscape) -->
      <div class="login-header text-center mb-6 sm:mb-8 animate-fade-up">
        <div id="burgerContainer" class="burger-icon jelly inline-flex items-center justify-center w-20 h-20 sm:w-24 sm:h-24 rounded-3xl bg-gradient-to-br from-orange-500/20 to-amber-500/20 backdrop-blur-xl border border-orange-400/20 mb-4" style="animation: pulse-glow 3s ease-in-out infinite;">
          <svg viewBox="0 0 100 100" class="w-12 h-12 sm:w-14 sm:h-14" fill="none">
            <!-- Pan superior -->
            <g class="burger-bun-top close">
              <path d="M18 38 Q18 18, 50 18 Q82 18, 82 38 L82 42 L18 42 Z" fill="url(#bunGrad)" stroke="#d97706" stroke-width="1.2"/>
              <circle cx="38" cy="28" r="1.4" fill="#fde68a"/>
              <circle cx="55" cy="25" r="1.2" fill="#fde68a"/>
              <circle cx="68" cy="30" r="1.4" fill="#fde68a"/>
              <circle cx="46" cy="33" r="1" fill="#fde68a"/>
            </g>
            <!-- Lechuga ondulada -->
            <g class="burger-lettuce">
              <path d="M14 48 Q20 44, 26 48 T38 48 T50 48 T62 48 T74 48 T86 48 L86 54 L14 54 Z" fill="#86efac" stroke="#16a34a" stroke-width="1"/>
            </g>
            <!-- Tomate -->
            <g class="burger-tomato">
              <rect x="16" y="55" width="68" height="6" rx="2" fill="#fb7185" stroke="#be123c" stroke-width="0.8"/>
              <circle cx="28" cy="58" r="0.8" fill="#fecdd3"/>
              <circle cx="50" cy="58" r="0.8" fill="#fecdd3"/>
              <circle cx="72" cy="58" r="0.8" fill="#fecdd3"/>
            </g>
            <!-- Queso -->
            <g class="burger-cheese">
              <path d="M14 62 L86 62 L82 70 L18 70 Z" fill="#fde047" stroke="#ca8a04" stroke-width="0.8"/>
              <path d="M22 70 L20 74" stroke="#ca8a04" stroke-width="0.8"/>
              <path d="M50 70 L48 74" stroke="#ca8a04" stroke-width="0.8"/>
              <path d="M78 70 L76 74" stroke="#ca8a04" stroke-width="0.8"/>
            </g>
            <!-- Carne -->
            <g class="burger-patty">
              <rect x="14" y="71" width="72" height="8" rx="3" fill="#78350f" stroke="#451a03" stroke-width="0.8"/>
              <ellipse cx="30" cy="75" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/>
              <ellipse cx="55" cy="74" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/>
              <ellipse cx="72" cy="76" rx="1" ry="0.6" fill="#451a03" opacity="0.5"/>
            </g>
            <!-- Pan inferior -->
            <g class="burger-bun-bottom close">
              <path d="M18 80 L82 80 L82 84 Q82 88, 78 88 L22 88 Q18 88, 18 84 Z" fill="url(#bunGrad)" stroke="#d97706" stroke-width="1.2"/>
            </g>
            <defs>
              <linearGradient id="bunGrad" x1="0" y1="0" x2="100" y2="100">
                <stop offset="0" stop-color="#fcd34d"/>
                <stop offset="1" stop-color="#f59e0b"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="text-3xl sm:text-4xl font-bold title-shine">InventarioHub</h1>
        <p class="text-slate-400 mt-2 text-sm sm:text-base">Gestión inteligente de inventario</p>
      </div>

      <!-- Card de auth -->
      <div class="bg-white/[0.03] backdrop-blur-2xl rounded-3xl shadow-2xl border border-white/10 p-6 sm:p-8 animate-fade-up animate-fade-up-delay-1">

        <div class="flex bg-white/5 rounded-xl p-1 mb-6">
          <button id="tabLogin" class="auth-tab flex-1 py-3 text-sm font-semibold rounded-lg bg-gradient-to-r from-blue-600 to-blue-500 text-white transition-all shadow-lg shadow-blue-500/20">Iniciar Sesión</button>
          <button id="tabRegister" class="auth-tab flex-1 py-3 text-sm font-semibold rounded-lg text-slate-400 hover:text-white transition-all">Solicitar acceso</button>
        </div>

        <p id="registerNotice" class="hidden mb-4 px-3 py-2 bg-amber-500/10 border border-amber-500/20 rounded-xl text-xs text-amber-200">
          El registro no es automatico. Un administrador debe aprobar tu solicitud antes de que puedas iniciar sesion.
        </p>

        <form id="loginForm" class="space-y-5" novalidate>
          <div>
            <label for="loginUsername" class="block text-sm font-medium text-slate-300 mb-2">Usuario</label>
            <input type="text" id="loginUsername" name="username" required autocomplete="username" placeholder="Tu usuario"
              class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 focus:bg-white/[0.07] transition-all duration-200 touch-target">
          </div>
          <div>
            <label for="loginPassword" class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
            <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="Tu contraseña"
              class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 focus:bg-white/[0.07] transition-all duration-200 touch-target">
          </div>
          <div id="loginError" class="hidden p-4 bg-red-500/10 border border-red-500/20 rounded-xl backdrop-blur-sm">
            <p class="text-sm text-red-300 text-center"></p>
          </div>
          <button type="submit" id="loginBtn"
            class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/25 hover:shadow-blue-500/40 transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 touch-target">
            <svg class="hidden w-5 h-5 animate-spin" data-spinner fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span>Iniciar Sesión</span>
          </button>
        </form>

        <form id="registerForm" class="space-y-5 hidden" novalidate>
          <div>
            <label for="regUsername" class="block text-sm font-medium text-slate-300 mb-2">Usuario</label>
            <input type="text" id="regUsername" name="username" required autocomplete="username" placeholder="Elige un usuario (min. 3 chars)"
              class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 focus:bg-white/[0.07] transition-all duration-200 touch-target">
          </div>
          <div>
            <label for="regPassword" class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
            <input type="password" id="regPassword" name="password" required autocomplete="new-password" placeholder="Mínimo 6 caracteres"
              class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 focus:bg-white/[0.07] transition-all duration-200 touch-target">
          </div>
          <div>
            <label for="regNombreCompleto" class="block text-sm font-medium text-slate-300 mb-2">Nombre completo</label>
            <input type="text" id="regNombreCompleto" name="nombreCompleto" placeholder="Tu nombre"
              class="w-full px-4 py-3.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 focus:bg-white/[0.07] transition-all duration-200 touch-target">
          </div>
          <div>

  <script>
    // === PARTICLE SYSTEM (estilo entigrabity) ===
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      var canvas = document.getElementById('particleCanvas');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var dpr = window.devicePixelRatio || 1;

      var W, H, particles = [];
      var mouse = { x: -9999, y: -9999, active: false };
      var PARTICLE_COUNT = 90;
      var BASE_RADIUS = 1.5;
      var MOUSE_RADIUS = 140;
      var WAVE_AMP = 22;
      var WAVE_FREQ = 0.012;
      var WAVE_SPEED = 0.0008;

      function resize() {
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.scale(dpr, dpr);
        initParticles();
      }

      function initParticles() {
        particles = [];
        for (var i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            vx: 0,
            vy: 0,
            baseX: 0,
            baseY: 0,
            size: BASE_RADIUS + Math.random() * 1.2,
            phase: Math.random() * Math.PI * 2,
            hue: 200 + Math.random() * 80 // azul a violeta
          });
          particles[i].baseX = particles[i].x;
          particles[i].baseY = particles[i].y;
        }
      }

      function draw(t) {
        ctx.clearRect(0, 0, W, H);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];

          // Posicion base con onda sinusoidal
          var wave = Math.sin(t * WAVE_SPEED + p.phase) * WAVE_AMP;
          var waveY = Math.cos(t * WAVE_SPEED * 0.7 + p.phase) * WAVE_AMP * 0.6;
          var tx = p.baseX + wave;
          var ty = p.baseY + waveY;

          // Atraccion al mouse
          if (mouse.active) {
            var dx = mouse.x - p.x;
            var dy = mouse.y - p.y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < MOUSE_RADIUS) {
              var force = (1 - dist / MOUSE_RADIUS) * 0.6;
              p.vx += (dx / dist) * force * 3;
              p.vy += (dy / dist) * force * 3;
            }
          }

          // Damping + retorno a base
          p.vx += (tx - p.x) * 0.04;
          p.vy += (ty - p.y) * 0.04;
          p.vx *= 0.88;
          p.vy *= 0.88;
          p.x += p.vx;
          p.y += p.vy;

          // Dibujar conexion a mouse si esta cerca
          if (mouse.active) {
            var dx = mouse.x - p.x;
            var dy = mouse.y - p.y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < MOUSE_RADIUS) {
              var alpha = (1 - dist / MOUSE_RADIUS) * 0.35;
              ctx.beginPath();
              ctx.moveTo(p.x, p.y);
              ctx.lineTo(mouse.x, mouse.y);
              ctx.strokeStyle = 'hsla(' + p.hue + ', 80%, 70%, ' + alpha + ')';
              ctx.lineWidth = 0.6;
              ctx.stroke();
            }
          }

          // Dibujar particula
          var sizeBoost = 0;
          if (mouse.active) {
            var dx = mouse.x - p.x;
            var dy = mouse.y - p.y;
            var dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < MOUSE_RADIUS) sizeBoost = (1 - dist / MOUSE_RADIUS) * 1.5;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size + sizeBoost, 0, Math.PI * 2);
          ctx.fillStyle = 'hsla(' + p.hue + ', 80%, 70%, 0.7)';
          ctx.fill();
        }

        // Dibujar cursor (anillo)
        if (mouse.active) {
          ctx.beginPath();
          ctx.arc(mouse.x, mouse.y, 18, 0, Math.PI * 2);
          ctx.strokeStyle = 'rgba(251, 191, 36, 0.25)';
          ctx.lineWidth = 1;
          ctx.stroke();
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
        mouse.active = true;
      });
      window.addEventListener('mouseleave', function() { mouse.active = false; });
      window.addEventListener('touchmove', function(e) {
        if (e.touches[0]) {
          mouse.x = e.touches[0].clientX;
          mouse.y = e.touches[0].clientY;
          mouse.active = true;
        }
      }, { passive: true });
      window.addEventListener('touchend', function() { mouse.active = false; });
      window.addEventListener('resize', resize);

      resize();
      requestAnimationFrame(draw);
    })();

    // === TRANSICION DE CARGA al ir al dashboard ===
    (function() {
      var loadingShown = false;
      window.showLoadingTransition = function(callback) {
        if (loadingShown) return;
        loadingShown = true;
        var overlay = document.getElementById('loadingOverlay');
        if (!overlay) { if (callback) callback(); return; }
        overlay.classList.remove('hidden');
        // Ejecutar callback despues de un momento para que se vea la animacion
        setTimeout(function() { if (callback) callback(); }, 700);
      };
    })();

    // Hook en el boton de login para mostrar la transicion
    document.addEventListener('DOMContentLoaded', function() {
      var loginBtn = document.getElementById('loginBtn');
      if (loginBtn) {
        var origClick = loginBtn.onclick;
        loginBtn.addEventListener('click', function() {
          // El auth.js maneja el submit, esto es solo preventivo
        });
      }
    });
  </script>
